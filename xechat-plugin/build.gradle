plugins {
    id 'java'
    id 'org.jetbrains.intellij' version '1.17.4'
}

group 'cn.xeblog'
version '1.6.7-beta0'

sourceCompatibility = 11
targetCompatibility = 11

buildSearchableOptions.enabled = false

repositories {
    mavenLocal()
    maven {
        url 'https://maven.aliyun.com/nexus/content/groups/public/'
    }
    mavenCentral()
}

ext {
    xechatCommonsVersion = '1.6.7-beta'
    lombokVersion = '1.18.38'
}

dependencies {
    testImplementation group: 'junit', name: 'junit', version: '4.12'
    implementation "cn.xeblog:xechat-commons:$rootProject.xechatCommonsVersion"
    compileOnly "org.projectlombok:lombok:$rootProject.lombokVersion"
    annotationProcessor "org.projectlombok:lombok:$rootProject.lombokVersion"
    testCompileOnly "org.projectlombok:lombok:$rootProject.lombokVersion"
    testAnnotationProcessor "org.projectlombok:lombok:$rootProject.lombokVersion"
}

// See https://github.com/JetBrains/gradle-intellij-plugin/
intellij {
    version.set('2021.3')
    updateSinceUntilBuild.set(false)
}
patchPluginXml {
    sinceBuild.set('191')
}

tasks.withType(JavaCompile) {
    options.encoding = 'UTF-8'
}
